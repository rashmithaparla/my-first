<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroShop - Single File Ecommerce</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{font-family:Arial,sans-serif}
.hero{background:#111;color:#fff;padding:80px 20px;text-align:center}
.card img{height:180px;object-fit:cover}
#scrollBtn{position:fixed;bottom:20px;right:20px;display:none}
section{padding:40px 0}
footer{background:#111;color:#fff;padding:20px;text-align:center}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">
<a class="navbar-brand text-warning" href="#">ElectroShop</a>
<div class="navbar-nav ms-auto">
<a class="nav-link" href="#home">Home</a>
<a class="nav-link" href="#products">Products</a>
<a class="nav-link" href="#cart">Cart</a>
<a class="nav-link" href="#contact">Contact</a>
</div></div></nav>

<section class="hero" id="home">
<h1>Electronics Store</h1>
<p>Mobiles • Laptops • Headphones • Watches</p>
<input class="form-control w-50 mx-auto" id="search" onkeyup="searchProducts()" placeholder="Search products">
</section>

<section class="container" id="products">
<h2>Products</h2>
<select id="filter" class="form-select w-25 mb-3" onchange="filterProducts()">
<option value="all">All</option>
<option value="mobile">Mobiles</option>
<option value="laptop">Laptops</option>
</select>
<div class="row" id="plist">
<div class="col-md-4 product" data-cat="mobile">
<div class="card"><img src="https://picsum.photos/400/200?1"><div class="card-body">
<h5>Smartphone Pro</h5><p>$899</p>
<button class="btn btn-warning" onclick="addCart('Smartphone Pro',899)">Add to Cart</button>
</div></div></div>
<div class="col-md-4 product" data-cat="laptop">
<div class="card"><img src="https://picsum.photos/400/200?2"><div class="card-body">
<h5>Gaming Laptop</h5><p>$1499</p>
<button class="btn btn-warning" onclick="addCart('Gaming Laptop',1499)">Add to Cart</button>
</div></div></div>
</div>
</section>

<section class="container" id="cart">
<h2>Cart</h2>
<ul id="cartList" class="list-group"></ul>
<h4 class="mt-3">Total: $<span id="total">0</span></h4>
</section>

<section class="container" id="contact">
<h2>Contact Us</h2>
<form onsubmit="return validate()">
<input class="form-control mb-2" id="name" placeholder="Name">
<input class="form-control mb-2" id="email" placeholder="Email">
<textarea class="form-control mb-2" placeholder="Message"></textarea>
<button class="btn btn-dark">Submit</button>
</form>
</section>

<footer>© 2026 ElectroShop</footer>
<button id="scrollBtn" class="btn btn-warning" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
let cart=[], total=0;
function addCart(n,p){cart.push({n,p}); total+=p; render();}
function render(){
document.getElementById('cartList').innerHTML=cart.map(i=>`<li class="list-group-item">${i.n} - $${i.p}</li>`).join('');
document.getElementById('total').innerText=total;
}
function filterProducts(){
let f=document.getElementById('filter').value;
document.querySelectorAll('.product').forEach(p=>{
p.style.display=(f==='all'||p.dataset.cat===f)?'block':'none';
});
}
function searchProducts(){
let v=document.getElementById('search').value.toUpperCase();
document.querySelectorAll('.product').forEach(p=>{
let t=p.innerText.toUpperCase();
p.style.display=t.includes(v)?'block':'none';
});
}
function validate(){
let n=document.getElementById('name').value;
let e=document.getElementById('email').value;
if(!n||!e){alert('Fill all fields'); return false;}
alert('Submitted!');
return false;
}
window.onscroll=()=>{document.getElementById('scrollBtn').style.display=window.scrollY>200?'block':'none';}
</script>
</body></html>
