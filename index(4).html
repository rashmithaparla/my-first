<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Reuse header from index.html -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <a href="/"><img src="images/logo.svg" alt="Brand Logo"></a>
      </div>
      <nav class="nav-menu" id="navMenu">
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/products">Products</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
      <div class="header-right">
        <div class="cart-icon">
          <a href="/cart.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="cart-badge" id="cartCount">0</span>
          </a>
        </div>
        <div class="hamburger" id="hamburger">
          <span></span><span></span>
        </div>
      </div>
    </div>
  </header>

  <main class="cart-page">
    <div class="container">
      <div class="cart-header">
        <h1>Your Cart</h1>
        <a href="/index.html" class="continue-shopping">← Continue Shopping</a>
      </div>

      <!-- Empty Cart State -->
      <div id="emptyCart" class="empty-cart" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <h2>Your cart is empty</h2>
        <p>Add some products to get started</p>
        <a href="/index.html" class="btn-primary">Shop Now</a>
      </div>

      <!-- Cart Content -->
      <div id="cartContent" class="cart-content">
        <div class="cart-items" id="cartItems">
          <!-- Items injected by JS -->
        </div>

        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">$0.00</span>
          </div>
          <button id="checkoutBtn" class="checkout-btn">Proceed to Checkout</button>
        </div>
      </div>
    </div>
  </main>

  <script src="scripts/cart.js"></script>
</body>
</html>
