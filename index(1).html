<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo">
      <a href="/">
        <img src="images/logo.svg" alt="Brand Logo">
      </a>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu" id="navMenu">
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/products">Products</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </nav>

    <!-- Right Side Elements -->
    <div class="header-right">
      <!-- Search Bar -->
      <div class="search-bar">
        <input type="text" placeholder="Search products..." id="searchInput">
        <button type="submit" class="search-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>

      <!-- Cart Icon -->
      <div class="cart-icon">
        <a href="/cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cartCount">3</span>
        </a>
      </div>

      <!-- Hamburger Menu -->
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
</header>
